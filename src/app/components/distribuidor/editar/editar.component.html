<ion-header>
  <ion-toolbar>
    <ion-title style="text-align: center;">
      Operador: {{operadorData.nombre}}
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form (ngSubmit)="editarOperador()" [formGroup]="editarOperadorForm" style="padding-top: 3%;">
    <ion-grid>
      <ion-row>
        <ion-col size="12">
          <ion-input label="Edita el nombre del operador" label-placement="floating" fill="outline"
            placeholder="Nombre" style="--background: #ffffff; text-transform: uppercase" formControlName="nombre">
          </ion-input>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="6">
          <ion-input label="Identificador" label-placement="floating" fill="outline"
            placeholder="Identificador" style="--background: #ffffff; text-transform: uppercase"
            formControlName="identificador">
          </ion-input>
        </ion-col>
        <ion-col size="6">
          <ion-input label="Edita ruta" label-placement="floating" fill="outline" placeholder="Ruta"
            style="--background: #ffffff; text-transform: uppercase" formControlName="ruta">
          </ion-input>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
          <ion-select label="Edita Zona" label-placement="floating" fill="outline" placeholder="Ruta"
            style="--background: #ffffff;" formControlName="zona" interface="popover">
            <ion-select-option value="gpe">Guadalupe</ion-select-option>
            <ion-select-option value="zac">Zacatecas</ion-select-option>
            <ion-select-option value="frs">Fresnillo</ion-select-option>
            <ion-select-option value="vn">Villa nueva</ion-select-option>
          </ion-select>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-button type="submit" expand="block" fill="clear" shape="round" color="success">
      Editar operador
    </ion-button>
  </form>
</ion-content>
