<ion-header>
  <ion-toolbar>
    <ion-title>Generar Reporte</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarModal()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="reporteForm">
    <ion-grid>
      <!-- Fila de zona y vendedor -->
      <ion-row>
        <ion-col size="12" sizeMd="6">
          <ion-item>
            <ion-select aria-label="Zona" formControlName="zona">
              <ion-select-option value="todo">Todos</ion-select-option>
              <ion-select-option value="guada">Guadalupe</ion-select-option>
              <ion-select-option value="zaca">Zacatecas</ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>

        <ion-col size="12" sizeMd="6">
          <ion-item>
            <ion-select aria-label="Vendedor" formControlName="vendedor" interface="popover" placeholder="Vendedores">
              <ion-select-option *ngFor="let dist of distribuidores" [value]="dist.identificador">
                {{ dist.nombre }}
              </ion-select-option>
            </ion-select>
          </ion-item>
        </ion-col>
      </ion-row>

      <!-- Checkbox para incluir fechas -->
      <ion-row>
        <ion-col size="12">
          <ion-item lines="none">
            <ion-label>¿Incluir filtro por fechas?</ion-label>
            <ion-checkbox slot="end" formControlName="incluirFechas"></ion-checkbox>
          </ion-item>
        </ion-col>
      </ion-row>

      <!-- Fechas de inicio y fin -->
      <ion-row style="padding-top: 3%;">
        <ion-col size="12" sizeMd="6" style="text-align: center;">
          <ion-label><b>Fecha inicio</b></ion-label>
          <ion-item>
            <ion-datetime
              formControlName="fechaInicio"
              presentation="date"
              [disabled]="!reporteForm.get('incluirFechas')?.value">
            </ion-datetime>
          </ion-item>
        </ion-col>

        <ion-col size="12" sizeMd="6" style="text-align: center;">
          <ion-label><b>Fecha fin</b></ion-label>
          <ion-item>
            <ion-datetime
              formControlName="fechaFin"
              presentation="date"
              [disabled]="!reporteForm.get('incluirFechas')?.value">
            </ion-datetime>
          </ion-item>
        </ion-col>
      </ion-row>

      <!-- Botón para generar -->
      <ion-row class="ion-padding-top">
        <ion-col size="12">
          <ion-button expand="block" [disabled]="!reporteForm.get('vendedor')?.value" (click)="generarReporte()">
            Generar
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
